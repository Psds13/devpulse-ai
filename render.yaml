services:
  - type: web
    name: devpulse-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_SQLITE
        value: false
      - key: DATABASE_URL
        sync: false  # Preencher manualmente no painel do Render
      - key: GITHUB_TOKEN
        sync: false  # Preencher manualmente no painel do Render
      - key: AI_API_KEY
        sync: false  # Preencher manualmente no painel do Render
