<!DOCTYPE html>
<html>
<head>
    <title>Relatório</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>📄 Relatório</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Score de Qualidade</h2>
        <p style="font-size: 24px;">{{ report.score }}</p>
    </div>

    <div class="card">
        <h3>Problemas encontrados</h3>
        <ul>
            {% for issue in report.issues %}
                <li>{{ issue }}</li>
            {% endfor %}
        </ul>
    </div>

    <a href="/dashboard">⬅ Voltar</a>

</div>

</body>
</html>
